<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cashfood</title>
    <link rel="stylesheet" href="css/index.css">
    <link rel="icon" type="image/png" href="imagenes/Logo/Cashfood.png">
</head>
<body>
    <header>
        <img src="imagenes/Logo/Cashfood.png" alt="Logo de la empresa" class="logoCashfood">
        <nav class="navegacion">
            <a href="index.html">Inicio</a>
            <a href="Html/productos.html">Productos</a>

            <a href="Html/carrito.html" class="btn-carrito">
               <ion-icon name="cart"></ion-icon>
               <span id="contador-carrito" style="display: none;">0</span> 
            </a>

            <a href="Html/historial.html" id="btn-historial" style="display: none;">Mis Facturas</a>

            <button class="btnlogin-popup">Login</button>

            

        </nav> 	
    </header>

    <main class="seccion-quioscos">
        <h1 class="titulo-principal">¡Pide y Recoge! Tu tiempo es oro ⏱️</h1>
        <div class="quioscos-contenedor">
            </div>
    </main>

    <div class="contenedor">

        <span class="icon-close"> 
            <ion-icon name="close"></ion-icon>
        </span>
        
        <div class="form-contenedor login">
            <h2>Iniciar sesión</h2>
            <form action="#">
                
                <div class="input-contenedor">
                    <span class="icon">
                        <ion-icon name="key-outline"></ion-icon> 
                    </span>
                    <input type="text" required placeholder="" name="carnet"> 
                    <label>Carné Institucional</label>
                </div>

                <div class="input-contenedor">
                    <span class="icon">
                        <ion-icon name="mail"></ion-icon>
                    </span>
                    <input type="email" required placeholder="">
                    <label>Gmail</label>
                </div>
                
                <div class="input-contenedor">
                    <span class="icon">
                        <ion-icon name="lock-closed"></ion-icon>
                    </span>
                    <input type="password" required placeholder="">
                    <label>Contraseña</label>
                </div>
                
                <div class="recuerdame-meolvidaste"> 	
                    <label><input type="checkbox" checked>Recuérdame</label>
                    <a href="#">Olvidaste tu contraseña?</a>
                </div>
                <button type="submit" class="btn">Login</button>
                <div class="login-register">
                    <p>¿No tienes una cuenta? <a href="#" class="register-link">Registrar</a></p> 
                </div>
            </form>
        </div>

        <div class="form-contenedor register">
            <h2>Registrarse</h2>
            <form action="#">
                <div class="input-contenedor">
                    <span class="icon"><ion-icon name="person"></ion-icon></span>
                    <input type="text" required placeholder="" name="nombre">
                    <label>Nombre de usuario</label>
                </div>
                <div class="input-contenedor">
                    <select name="rol" style="width:100%; padding:10px; border-radius:6px; border:1px solid #ddd; font-size:1rem;">
                        <option value="cliente" selected>Cliente</option>
                        <option value="admin">Administrador</option>
                    </select>
                </div>
                <div class="input-contenedor">
                    <select name="kiosco" style="width:100%; padding:10px; border-radius:6px; border:1px solid #ddd; font-size:1rem;">
                        <option value="don_domingo">Cafétin Don Domingo</option>
                        <option value="kilambe">Café Kilambé</option>
                        <option value="caribeño">Caribeño</option>
                        <option value="el_gueguense">El Güegüense</option>
                        <option value="las_margaritas">Las Margaritas</option>
                        <option value="el_profe">El Quiosco del profe</option>
                    </select>
                </div>
                <div class="input-contenedor">
                    <span class="icon"><ion-icon name="mail"></ion-icon></span>
                    <input type="email" required placeholder="">
                    <label>Gmail</label>
                </div>
                <div class="input-contenedor">
                    <span class="icon"><ion-icon name="key-outline"></ion-icon></span>
                    <input type="text" required placeholder="" name="carnet">
                    <label>Carné Institucional</label>
                </div>
                <div class="input-contenedor">
                    <span class="icon"><ion-icon name="lock-closed"></ion-icon></span>
                    <input type="password" required placeholder="">
                    <label>Contraseña</label>
                </div>
                <div class="recuerdame-meolvidaste"> 	
                    <label><input type="checkbox"> Estoy de acuerdo con los terminos y condiciones</label>
                </div>
                <button type="submit" class="btn">Registrarse</button>
                <div class="login-register">
                    <p>¿Ya tienes una cuenta? <a href="#" class="login-link">Login</a></p> 
                </div>
            </form>
        </div>
    </div> 
    <script src="js/index.js"></script>
    <script src="js/utilidades/carrito_utilidades.js"></script>
    <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>
</body>
</html>
