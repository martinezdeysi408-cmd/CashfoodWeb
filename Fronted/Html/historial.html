<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial de Compras | Cashfood</title>
    <link rel="icon" type="image/png" href="../imagenes/Logo/Cashfood.png">
    <link rel="stylesheet" href="../css/index.css">
    <link rel="stylesheet" href="../css/carrito.css"> <style>
        .seccion-historial {
            width: 100%;
            max-width: 1000px;
            padding: 120px 20px 40px 20px;
            margin: auto;
            text-align: center;
        }
        .historial-lista {
            display: grid;
            gap: 20px;
            margin-top: 30px;
            text-align: left;
        }
        .item-orden {
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            border-left: 5px solid #f9a03f;
        }
        .item-orden h3 {
            margin-top: 0;
            color: #162938;
            font-size: 1.4em;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .item-orden p {
            margin: 5px 0;
            font-size: 0.9em;
        }
        .detalle-productos {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px dashed #ccc;
        }
        .producto-linea {
            display: flex;
            justify-content: space-between;
            font-size: 0.85em;
            margin-bottom: 3px;
        }
        .total-orden {
            font-size: 1.1em;
            font-weight: bold;
            color: #f9a03f;
            text-align: right;
        }
        /* Estilos para header y botón volver (ajustes mínimos) */
        .header-top{
            display:flex;
            align-items:center;
            justify-content:space-between;
            gap:12px;
            max-width:1000px;
            margin: 0 auto;
            padding: 20px 20px 0 20px;
        }
        .btn-back{
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            color: #162938;
            display:inline-flex;
            align-items:center;
            gap:6px;
            padding: 8px 16px;
            border-radius: 6px;
            transition: background 0.2s;
        }
        .btn-back:hover{
            background: #f9a03f22;
        }
       
    </style>
</head>
<body>
    <header>
        <img src="../imagenes/logo/Cashfood.png" alt="Logo de la empresa" class="logoCashfood">
        <nav class="navegacion">
            <a href="../index.html">Inicio</a>
            <a href="productos.html">Productos</a>
            <a href="acerca.html">Acerca</a>
            <a href="carrito.html" class="btn-carrito">
               <ion-icon name="cart"></ion-icon>
               <span id="contador-carrito" style="display: none;">0</span> 
            </a>
            <a href="historial.html" id="btn-historial" style="display: none;">Mis Facturas</a>
            <button class="btnlogin-popup">Login</button>
        </nav>
    </header>

    <main class="seccion-historial">
        <h1 class="titulo-principal">Historial de Mis Compras</h1>
        
        <div id="historial-contenedor" class="historial-lista">
            <p style="text-align: center;">Cargando historial...</p>
        </div>
        <div style="margin-top:40px; text-align:center;">
            <button class="btn-back" onclick="history.back()" aria-label="Volver" style="margin:auto;">
                <ion-icon name="chevron-back-outline"></ion-icon>
                <span style="vertical-align:middle; font-size:1em;">Volver</span>
            </button>
        </div>
    </main>
    
    <script src="../js/index.js"></script> 
    <script src="../js/utilidades/carrito_utilidades.js"></script> 
    <script src="../js/historial.js"></script> <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>
</body>
</html>
